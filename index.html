<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>首爾櫻花祭 2026</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFB7C5">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"首爾賞櫻","short_name":"首爾賞櫻","display":"standalone","background_color":"#FFF0F5","theme_color":"#FFB7C5","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🌸%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"},{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🌸%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@1.1/font/jf-openhuninn.css" rel="stylesheet">
  
  <style>
    :root { --sakura-pink: #FFB7C5; --soft-pink: #FFF0F5; --text-color: #4A4A4A; }
    body { 
      background-color: var(--soft-pink); 
      font-family: 'jf-openhuninn', sans-serif; /* ★ 套用粉圓字體 ★ */
      color: var(--text-color); 
      padding-bottom: 90px; 
      margin: 0; 
    }
    /* ... 之後的 CSS 保持不變 ... */
    
    /* 讓卡片飛入的絲滑動畫 */
.itinerary-item {
  animation: slideIn 0.3s ease-out forwards;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(30px); /* 從右邊一點點飛進來 */
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}
.itinerary-item { animation: slideIn 0.3s ease-out forwards; }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
/* 如果是往回滑，可以加另一個反向動畫，但我們先統一用一個最簡約好用的 */
    
    /* 導覽列優化：容納三個按鈕 */
    .navbar { background-color: white !important; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); border-top-left-radius: 20px; border-top-right-radius: 20px; }
    .nav-btn { border: none; background: none; color: #aaa; font-weight: bold; transition: 0.3s; padding: 10px 15px; border-radius: 12px; font-size: 0.85em; }
    .nav-btn.active { color: var(--sakura-pink); background-color: #fff0f5; transform: translateY(-3px); }

    .pink-card { background: white; border-radius: 22px; border: none; box-shadow: 0 5px 18px rgba(255,183,197,0.3); margin-bottom: 18px; padding: 20px; }
    .note-badge { background-color: var(--sakura-pink); color: white; border-radius: 20px; padding: 6px 14px; display: inline-block; font-weight: bold; font-size: 0.85em; }
    
    /* 加大輸入框設計 */
    .form-control-lg, .form-select-lg { 
      border-radius: 15px !important; 
      border: 2px solid #ffe4e9; 
      padding: 15px; 
      font-size: 1.1em;
    }
    .form-control-lg:focus { border-color: var(--sakura-pink); box-shadow: 0 0 0 0.25rem rgba(255,183,197,0.25); }
    .btn-pink { background: linear-gradient(135deg, #FFB7C5 0%, #ff8fa3 100%); color: white; border-radius: 18px; border: none; padding: 15px; font-weight: 900; font-size: 1.1em; box-shadow: 0 4px 12px rgba(255,143,163,0.3); }

    .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--soft-pink); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .section { display: none; }
    .active-section { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .date-tabs-container { display: flex; overflow-x: auto; gap: 12px; padding: 5px 0 15px; white-space: nowrap; scrollbar-width: none; }
    .date-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: white; border: 2px solid var(--sakura-pink); color: var(--sakura-pink); border-radius: 18px; padding: 10px 22px; font-weight: bold; flex-shrink: 0; }
    .date-tab.active { background-color: var(--sakura-pink); color: white; box-shadow: 0 4px 12px rgba(255,183,197,0.5); }

    .total-box { background: linear-gradient(135deg, #FFB7C5 0%, #ff9fb1 100%); color: white; text-align: center; border-radius: 25px; padding: 25px; box-shadow: 0 6px 20px rgba(255,183,197,0.4); margin-bottom: 25px; }
    .weather-widget { background-color: rgba(255,183,197,0.25); padding: 8px 20px; border-radius: 20px; font-size: 0.9em; font-weight: bold; display: inline-block; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div id="loading" class="loading-screen">
    <h2 style="color: var(--sakura-pink);">🌸</h2>
    <p>載入專屬行程中...</p>
  </div>

  <div class="container mt-4">
    <div id="page-itinerary" class="section active-section">
      <h3 class="text-center mb-2 fw-bold" style="color: #ff8fa3;">🌸 Seoul 2026.03 🌸</h3>
      <div class="text-center">
        <div id="weather-info" class="weather-widget">讀取天氣中...</div>
      </div>
      <div id="itin-date-tabs" class="date-tabs-container"></div>
      <div id="itinerary-list"></div>
    </div>

    <div id="page-budget" class="section">
      <h3 class="text-center mb-4 fw-bold" style="color: #ff8fa3;">💰 旅程記帳</h3>
      <div class="total-box">
        <h6 class="mb-1" style="opacity: 0.9;">總花費累積</h6>
        <h1 class="fw-bold mb-0">NT$ <span id="total-twd">0</span></h1>
      </div>
      
      <div class="pink-card mb-4">
        <h5 class="mb-3 fw-bold text-center">📝 新增支出</h5>
        <select id="expense-category" class="form-select form-select-lg mb-3">
          <option value="飲食">🍽️ 飲食</option>
          <option value="交通">🚇 交通</option>
          <option value="購物">🛍️ 購物</option>
          <option value="娛樂">🎟️ 娛樂</option>
          <option value="其他">📌 其他</option>
        </select>
        <input type="text" id="expense-item" class="form-control form-control-lg mb-3" placeholder="買了什麼？">
        <div class="row g-2 mb-3">
          <div class="col-7">
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white border-end-0">₩</span>
              <input type="number" id="expense-krw" class="form-control border-start-0" placeholder="韓元" oninput="autoCalcTWD()">
            </div>
          </div>
          <div class="col-5">
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white border-end-0 text-danger fw-bold">NT</span>
              <input type="number" id="expense-twd" class="form-control border-start-0 text-danger fw-bold" placeholder="台幣">
            </div>
          </div>
        </div>
        <button onclick="submitExpense()" class="btn btn-pink w-100" id="submit-btn">儲存這筆支出</button>
      </div>
      <div id="expense-list"></div>
    </div>

    <div id="page-exchange" class="section">
      <h3 class="text-center mb-4 fw-bold" style="color: #ff8fa3;">⚡ 匯率換算</h3>
      <div class="pink-card text-center mb-4">
        <p class="text-muted mb-1">當前即時匯率</p>
        <h4 class="fw-bold" style="color: var(--sakura-pink);">1 KRW = <span id="current-rate">--</span> TWD</h4>
      </div>
      
      <div class="pink-card" style="background-color: var(--soft-pink);">
        <label class="form-label fw-bold">輸入韓元 (KRW)</label>
        <div class="input-group input-group-lg mb-4">
          <span class="input-group-text bg-white border-end-0">₩</span>
          <input type="number" id="quick-krw" class="form-control border-start-0 fw-bold" placeholder="0" oninput="quickCalcTWD()">
        </div>
        
        <div class="text-center mb-4"><span style="font-size: 2em; color: var(--sakura-pink);">⬇️</span></div>
        
        <label class="form-label fw-bold">折合台幣 (TWD)</label>
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-white border-end-0 text-danger">NT$</span>
          <input type="text" id="quick-twd" class="form-control border-start-0 text-danger fw-bold bg-white" readonly>
        </div>
      </div>
      <p class="text-center text-muted mt-3 small">※ 匯率由 ExchangeRate-API 自動提供</p>
    </div>
  </div>

  <nav class="navbar fixed-bottom py-2">
    <div class="container-fluid d-flex justify-content-evenly">
      <button onclick="showPage('itinerary', this)" class="nav-btn active">📅 行程</button>
      <button onclick="showPage('budget', this)" class="nav-btn">💰 記帳</button>
      <button onclick="showPage('exchange', this)" class="nav-btn">⚡ 匯率</button>
    </div>
  </nav>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx1sBOtKjH9gO1Q9OlUbXGbgmw3uzRLjanuKwAAfMcDkjq7-zNvsqRDcu-fEqKokjFK/exec'; 

    let globalData = { itinerary: [], routes: [] };
    let currentRate = 0.023; 
    let currentSelectedDate = ""; // 新增這行

    function showPage(pageId, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
      document.getElementById('page-' + pageId).classList.add('active-section');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.scrollTo(0,0);
    }

    function autoCalcTWD() {
      var krw = document.getElementById('expense-krw').value;
      document.getElementById('expense-twd').value = krw ? Math.round(krw * currentRate) : '';
    }

    function quickCalcTWD() {
      var krw = document.getElementById('quick-krw').value;
      document.getElementById('quick-twd').value = krw ? Math.round(krw * currentRate).toLocaleString() : '0';
    }

async function fetchSeoulWeather() {

      try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true');
        const data = await response.json();
        const temp = data.current_weather.temperature;
        document.getElementById('weather-info').innerHTML = `📍首爾即時：🌸 ${temp}°C `;
      } catch (e) {
        document.getElementById('weather-info').innerHTML = `📍首爾：美好旅程 🌸`;
      }
    }

    fetchSeoulWeather();
 // === 全域絲滑滑動功能 ===
let touchstartX = 0;
let touchstartY = 0; // 增加 Y 軸紀錄，防止上下捲動時誤觸左右切換
let touchendX = 0;

// 將監聽器掛在 window 上，實現「全頁面操作」
window.addEventListener('touchstart', e => {
  touchstartX = e.changedTouches[0].screenX;
  touchstartY = e.changedTouches[0].screenY;
}, {passive: true});

window.addEventListener('touchend', e => {
  touchendX = e.changedTouches[0].screenX;
  const touchendY = e.changedTouches[0].screenY;
  
  // 檢查是否在「行程」分頁，且不是在上下捲動
  const isItineraryPage = document.getElementById('page-itinerary').classList.contains('active-section');
  const diffX = Math.abs(touchendX - touchstartX);
  const diffY = Math.abs(touchendY - touchstartY);

  // 只有在 X 軸位移大於 Y 軸（代表是左右滑），且位移超過 50 像素時觸發
  if (isItineraryPage && diffX > diffY && diffX > 50) {
    handleGlobalSwipe();
  }
}, {passive: true});

function handleGlobalSwipe() {
  const dates = [...new Set(globalData.itinerary.concat(globalData.routes).map(r => r[1]))].filter(d => d).sort();
  const currentIndex = dates.indexOf(currentSelectedDate);
  const tabs = document.querySelectorAll('#itin-date-tabs .date-tab');

  if (touchendX < touchstartX) {
    // 往左滑 -> 看明天
    if (currentIndex < dates.length - 1) {
      const nextDate = dates[currentIndex + 1];
      filterItinerary(nextDate, tabs[currentIndex + 1]);
      tabs[currentIndex + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  } else {
    // 往右滑 -> 看昨天
    if (currentIndex > 0) {
      const prevDate = dates[currentIndex - 1];
      filterItinerary(prevDate, tabs[currentIndex - 1]);
      tabs[currentIndex - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }
}

// 修改原本的 filterItinerary 渲染部分，加上動畫類別
function filterItinerary(date, el) {
  currentSelectedDate = date;
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');

  let html = globalData.itinerary.filter(r => r[1] === date && r[2]).map(r => {
    let route = globalData.routes.find(rt => rt[2] === r[2]);
    let nav = (route && route[5] && route[5].includes('http')) ? `<a href="${route[5]}" target="_blank" class="btn btn-sm btn-success" style="border-radius:15px; font-weight:bold;">NAVER</a>` : '';
    
    // 注意這裡！我幫每個卡片加了 .itinerary-item 類別來觸發 CSS 動畫
    return `<div class="pink-card itinerary-item">
              <div class="d-flex justify-content-between mb-2">
                <span>${r[4]?'<span class="note-badge">🕒 '+r[4]+'</span>':''}</span>
                ${nav}
              </div>
              <h4 class="fw-bold" style="color:#333;">${r[2]}</h4>
              <p class="text-muted mb-0">${r[3]||''}</p>
            </div>`;
  }).join('');
  
  document.getElementById('itinerary-list').innerHTML = html || '<p class="text-muted text-center itinerary-item">今日暫無行程</p>';
}
    fetch(GAS_URL).then(res => res.json()).then(data => renderData(data)).catch(() => {
      alert("資料讀取失敗！");
      document.getElementById('loading').style.display = 'none';
    });

    function renderData(res) {
      document.getElementById('loading').style.display = 'none';
      globalData = res;
      currentRate = res.rate;
      document.getElementById('current-rate').innerText = currentRate.toFixed(4);
      
      let dates = [...new Set(res.itinerary.concat(res.routes).map(r => r[1]))].filter(d => d).sort();
      let tabsHtml = dates.map((d, i) => `<div class="date-tab ${i===0?'active':''}" onclick="filterItinerary('${d}', this)"><span style="font-size: 0.7em; opacity:0.8;">DAY ${i+1}</span><span>${d}</span></div>`).join('');
      document.getElementById('itin-date-tabs').innerHTML = tabsHtml;
      if(dates.length > 0) filterItinerary(dates[0], document.querySelector('.date-tab'));

      let total = 0;
      let expHtml = res.expenses.slice().reverse().map(row => {
        let twd = parseFloat(row[4]) || Math.round(row[3] * currentRate);
        total += twd;
        return `<div class="pink-card d-flex justify-content-between align-items-center mb-2" style="padding: 15px 20px;">
                  <div><div class="text-muted" style="font-size:0.75em;">${row[0]} | ${row[1]}</div><div class="fw-bold" style="font-size:1.1em;">${row[2]}</div></div>
                  <div class="text-end d-flex align-items-center gap-3">
                    <div><div class="fw-bold text-danger" style="font-size:1.2em;">$${twd.toLocaleString()}</div><div class="text-muted" style="font-size:0.8em;">₩${Number(row[3]).toLocaleString()}</div></div>
                    <button onclick="removeExpense(${row[row.length-1]})" class="btn p-0" style="opacity:0.2; font-size:1.2em;">🗑️</button>
                  </div>
                </div>`;
      }).join('');
      document.getElementById('total-twd').innerText = total.toLocaleString();
      document.getElementById('expense-list').innerHTML = expHtml || '<p class="text-center text-muted mt-4">尚無支出紀錄</p>';
    }

function filterItinerary(date, el) {
      currentSelectedDate = date;
      document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
      if(el) el.classList.add('active');
      
      let html = globalData.itinerary.filter(r => r[1] === date && r[2]).map(r => {
        let route = globalData.routes.find(rt => rt[2] === r[2]);
        let nav = (route && route[5] && route[5].includes('http')) ? `<a href="${route[5]}" target="_blank" class="btn btn-sm btn-success" style="border-radius:15px; font-weight:bold;">NAVER</a>` : '';
        
        // ★ 關鍵：在這裡加上 itinerary-item 類別，CSS 才會執行飛入動畫 ★
        return `<div class="pink-card itinerary-item">
                  <div class="d-flex justify-content-between mb-2">
                    <span>${r[4]?'<span class="note-badge">🕒 '+r[4]+'</span>':''}</span>
                    ${nav}
                  </div>
                  <h4 class="fw-bold" style="color:#333;">${r[2]}</h4>
                  <p class="text-muted mb-0">${r[3]||''}</p>
                </div>`;
      }).join('');
      document.getElementById('itinerary-list').innerHTML = html || '<p class="text-muted text-center itinerary-item">今日暫無行程</p>';
    }

    function submitExpense() {
      let btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = "儲存中...";
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
        action: 'add', 
        category: document.getElementById('expense-category').value,
        item: document.getElementById('expense-item').value,
        krwAmount: document.getElementById('expense-krw').value,
        twdAmount: document.getElementById('expense-twd').value
      })}).then(r => r.json()).then(d => {
        renderData(d);
        btn.disabled = false; btn.innerText = "儲存這筆支出";
        ['expense-item','expense-krw','expense-twd'].forEach(id => document.getElementById(id).value='');
      });
    }

    function removeExpense(id) {
      if(!confirm("確定刪除此筆記帳？")) return;
      document.getElementById('loading').style.display='flex';
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowNum: id })})
      .then(r => r.json()).then(d => renderData(d));
    }
  </script>
</body>
</html>
