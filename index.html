<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>首爾櫻花祭 2026</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFB7C5">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  <link rel="manifest" href='data:application/manifest+json,{"name":"首爾賞櫻","short_name":"首爾賞櫻","display":"standalone","background_color":"#FFF0F5","theme_color":"#FFB7C5","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🌸%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"},{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🌸%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@1.1/font/jf-openhuninn.css" rel="stylesheet">
  
  <style>
    :root { --sakura-pink: #FFB7C5; --soft-pink: #FFF0F5; --text-color: #4A4A4A; }
    
    /* 核心佈局：禁止橫向跑版 */
    html, body { 
      background-color: var(--soft-pink); 
      font-family: 'jf-openhuninn', sans-serif; 
      color: var(--text-color); 
      margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
      -webkit-tap-highlight-color: transparent;
    }

    /* 固定頂部區域 (包含標題、天氣、日期) */
    .fixed-header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background-color: var(--soft-pink);
      padding-top: env(safe-area-inset-top);
      box-shadow: 0 5px 15px rgba(0,0,0,0.02);
    }

    .app-header { text-align: center; padding: 15px 0 5px; }
    .app-title { font-weight: 900; color: #ff8fa3; font-size: 1.4rem; letter-spacing: 1px; }

    /* ★ 天氣小工具：粉底、黑字 ★ */
    .weather-widget { 
      background-color: var(--sakura-pink); color: #000000; 
      padding: 6px 20px; border-radius: 25px; font-size: 0.85rem; 
      font-weight: bold; display: inline-block; margin-top: 5px;
    }

    /* 日期選單：水平滑動但不影響頁面 */
    .date-tabs-container { 
      display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px 15px; 
      white-space: nowrap; scrollbar-width: none; 
    }
    .date-tabs-container::-webkit-scrollbar { display: none; }
    .date-tab { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: white; border: 1.5px solid var(--sakura-pink); color: var(--sakura-pink); 
      border-radius: 18px; padding: 8px 22px; font-weight: bold; flex-shrink: 0; min-width: 85px;
    }
    .date-tab.active { background: var(--sakura-pink); color: white; box-shadow: 0 4px 10px rgba(255,183,197,0.3); }

    /* 內容區：為固定頂部留空間 */
    .content-area { padding: 170px 15px 100px; width: 100%; }

    /* 絲滑切換動畫 */
    .fade-in-up { animation: fadeInUp 0.35s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 卡片與元件 */
    .pink-card { 
      background: white; border-radius: 22px; border: none; 
      box-shadow: 0 6px 18px rgba(255,183,197,0.2); margin-bottom: 18px; padding: 20px; 
    }
    .note-badge { background: var(--sakura-pink); color: white; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: bold; }
    
    /* 底部導覽 */
    .navbar { background: white !important; border-top: 1px solid #ffe4e9; padding-bottom: calc(env(safe-area-inset-bottom) + 5px); }
    .nav-btn { border: none; background: none; color: #bbb; font-weight: bold; font-size: 0.85rem; padding: 10px; flex: 1; }
    .nav-btn.active { color: var(--sakura-pink); background: #fff8f9; border-radius: 12px; }

    /* 記帳與匯率專區樣式保持大尺寸 */
    .total-box { background: linear-gradient(135deg, #FFB7C5 0%, #ff9fb1 100%); color: white; text-align: center; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(255,183,197,0.3); }
    .form-control-lg { border-radius: 15px !important; border: 2px solid #fff5f7; padding: 14px; font-size: 1rem; }
    .btn-pink { background: linear-gradient(135deg, #FFB7C5 0%, #ff8fa3 100%); color: white; border-radius: 18px; border: none; padding: 14px; font-weight: 900; }

    .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--soft-pink); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .section { display: none; }
    .active-section { display: block; }
  </style>
</head>
<body>

  <div id="loading" class="loading-screen">
    <h2 style="color: var(--sakura-pink); font-size: 2.5rem;">🌸</h2>
    <p>正在載入首爾櫻花季...</p>
  </div>

  <div id="page-itinerary" class="section active-section">
    <div class="fixed-header">
      <div class="app-header">
        <div class="app-title">Seoul 2026.03</div>
        <div id="weather-info" class="weather-widget">讀取天氣中...</div>
      </div>
      <div id="itin-date-tabs" class="date-tabs-container"></div>
    </div>
    <div class="content-area" id="itinerary-list"></div>
  </div>

  <div id="page-budget" class="section">
    <div style="padding: 30px 15px 100px;">
      <h3 class="text-center mb-4 fw-bold" style="color: #ff8fa3;">旅程記帳本</h3>
      <div class="total-box">
        <div class="small opacity-75 mb-1">總花費累積</div>
        <div class="h2 fw-bold mb-0">NT$ <span id="total-twd">0</span></div>
      </div>
      <div class="pink-card">
        <select id="expense-category" class="form-select form-select-lg mb-3">
          <option value="飲食">🍽️ 飲食</option><option value="交通">🚇 交通</option>
          <option value="購物">🛍️ 購物</option><option value="娛樂">🎟️ 娛樂</option><option value="其他">📌 其他</option>
        </select>
        <input type="text" id="expense-item" class="form-control form-control-lg mb-3" placeholder="項目名稱">
        <div class="row g-2 mb-3">
          <div class="col-7"><input type="number" id="expense-krw" class="form-control form-control-lg" placeholder="韓元" oninput="autoCalcTWD()"></div>
          <div class="col-5"><input type="number" id="expense-twd" class="form-control form-control-lg text-danger fw-bold" placeholder="台幣"></div>
        </div>
        <button onclick="submitExpense()" class="btn btn-pink w-100" id="submit-btn">儲存支出</button>
      </div>
      <div id="expense-list"></div>
    </div>
  </div>

  <div id="page-exchange" class="section">
    <div style="padding: 30px 15px 100px;">
      <h3 class="text-center mb-4 fw-bold" style="color: #ff8fa3;">快速換算</h3>
      <div class="pink-card text-center mb-4" style="background:#fff9fa;">
        <div class="text-muted small mb-1">即時匯率基準</div>
        <h4 class="fw-bold mb-0" style="color: var(--sakura-pink);">1 KRW = <span id="current-rate">--</span> TWD</h4>
      </div>
      <div class="pink-card">
        <label class="form-label fw-bold small">輸入韓元 (KRW)</label>
        <input type="number" id="quick-krw" class="form-control form-control-lg mb-4" placeholder="0" oninput="quickCalcTWD()">
        <div class="text-center mb-4 opacity-25">▼</div>
        <label class="form-label fw-bold small">折合台幣 (TWD)</label>
        <input type="text" id="quick-twd" class="form-control form-control-lg text-danger fw-bold bg-light" readonly>
      </div>
    </div>
  </div>

  <nav class="navbar fixed-bottom py-2">
    <div class="container-fluid d-flex justify-content-evenly">
      <button onclick="showPage('itinerary', this)" class="nav-btn active">📅 行程</button>
      <button onclick="showPage('budget', this)" class="nav-btn">💰 記帳</button>
      <button onclick="showPage('exchange', this)" class="nav-btn">⚡ 匯率</button>
    </div>
  </nav>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx1sBOtKjH9gO1Q9OlUbXGbgmw3uzRLjanuKwAAfMcDkjq7-zNvsqRDcu-fEqKokjFK/exec'; 
    let globalData = { itinerary: [], routes: [] }, currentRate = 0.023, currentSelectedDate = "";

    function showPage(pageId, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
      document.getElementById('page-' + pageId).classList.add('active-section');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); window.scrollTo(0,0);
    }

    function autoCalcTWD() {
      let krw = document.getElementById('expense-krw').value;
      document.getElementById('expense-twd').value = krw ? Math.round(krw * currentRate) : '';
    }

    function quickCalcTWD() {
      let krw = document.getElementById('quick-krw').value;
      document.getElementById('quick-twd').value = krw ? Math.round(krw * currentRate).toLocaleString() : '0';
    }

    async function fetchSeoulWeather() {
      try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true');
        const data = await response.json();
        document.getElementById('weather-info').innerHTML = `📍首爾即時：🌸 ${data.current_weather.temperature}°C`;
      } catch (e) { document.getElementById('weather-info').innerHTML = `📍首爾：賞櫻愉快 🌸`; }
    }

    // --- 全域滑動手勢：鎖定行程內容區 ---
    let startX = 0, startY = 0;
    const swipeArea = document.getElementById('page-itinerary');

    swipeArea.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});

    swipeArea.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      
      // 橫向滑動需大於縱向，且位移超過門檻
      if (Math.abs(dx) > dy && Math.abs(dx) > 70) {
        let dates = [...new Set(globalData.itinerary.concat(globalData.routes).map(r => r[1]))].filter(d => d).sort();
        let idx = dates.indexOf(currentSelectedDate);
        if (dx < 0 && idx < dates.length - 1) { // 往左滑 -> 下一天
          filterItinerary(dates[idx+1], document.querySelectorAll('.date-tab')[idx+1]);
        } else if (dx > 0 && idx > 0) { // 往右滑 -> 前一天
          filterItinerary(dates[idx-1], document.querySelectorAll('.date-tab')[idx-1]);
        }
      }
    }, {passive: true});

    function filterItinerary(date, el) {
      if (currentSelectedDate === date && el && el.classList.contains('active')) return;
      currentSelectedDate = date;
      
      document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
      if(el) {
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
      
      const listDiv = document.getElementById('itinerary-list');
      listDiv.classList.remove('fade-in-up'); void listDiv.offsetWidth; listDiv.classList.add('fade-in-up');

      let html = globalData.itinerary.filter(r => r[1] === date && r[2]).map(r => {
        let route = globalData.routes.find(rt => rt[2] === r[2]);
        let nav = (route && route[5] && route[5].includes('http')) ? `<a href="${route[5]}" target="_blank" class="btn btn-sm btn-success px-3" style="border-radius:12px; background:#03c75a;">NAVER</a>` : '';
        return `<div class="pink-card">
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <span>${r[4]?'<span class="note-badge">🕒 '+r[4]+'</span>':''}</span>
                    ${nav}
                  </div>
                  <h4 class="fw-bold mb-1">${r[2]}</h4>
                  <div class="text-muted small">${r[3]||''}</div>
                </div>`;
      }).join('');
      listDiv.innerHTML = html || '<p class="text-center py-5 text-muted opacity-50">今日暫無行程規劃</p>';
    }

    function renderData(res) {
      document.getElementById('loading').style.display = 'none';
      globalData = res; currentRate = res.rate;
      document.getElementById('current-rate').innerText = currentRate.toFixed(4);
      
      let dates = [...new Set(res.itinerary.concat(res.routes).map(r => r[1]))].filter(d => d).sort();
      document.getElementById('itin-date-tabs').innerHTML = dates.map((d, i) => 
        `<div class="date-tab ${i===0?'active':''}" onclick="filterItinerary('${d}', this)">
          <div style="font-size: 0.6rem; opacity:0.6; margin-bottom:2px;">DAY ${i+1}</div>
          <div>${d}</div>
        </div>`).join('');
      if(dates.length > 0) filterItinerary(dates[0], document.querySelector('.date-tab'));

      let total = 0;
      let expHtml = res.expenses.slice().reverse().map(row => {
        let twd = parseFloat(row[4]) || Math.round(row[3] * currentRate);
        total += twd;
        return `<div class="pink-card d-flex justify-content-between align-items-center mb-2" style="padding: 15px 20px;">
                  <div><div class="text-muted small" style="font-size:0.7rem;">${row[0]} | ${row[1]}</div><div class="fw-bold">${row[2]}</div></div>
                  <div class="text-end d-flex align-items-center gap-3">
                    <div><div class="fw-bold text-danger">$${twd.toLocaleString()}</div><div class="text-muted" style="font-size:0.7rem;">₩${Number(row[3]).toLocaleString()}</div></div>
                    <button onclick="removeExpense(${row[row.length-1]})" class="btn btn-link p-0 opacity-25">🗑️</button>
                  </div>
                </div>`;
      }).join('');
      document.getElementById('total-twd').innerText = total.toLocaleString();
      document.getElementById('expense-list').innerHTML = expHtml || '<p class="text-center py-4 text-muted small">尚無支出紀錄</p>';
    }

    fetchSeoulWeather();
    fetch(GAS_URL).then(res => res.json()).then(data => renderData(data));

    function submitExpense() {
      let btn = document.getElementById('submit-btn'); btn.disabled = true; btn.innerText = "儲存中...";
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
        action: 'add', category: document.getElementById('expense-category').value, item: document.getElementById('expense-item').value,
        krwAmount: document.getElementById('expense-krw').value, twdAmount: document.getElementById('expense-twd').value
      })}).then(r => r.json()).then(d => {
        renderData(d); btn.disabled = false; btn.innerText = "儲存支出";
        ['expense-item','expense-krw','expense-twd'].forEach(id => document.getElementById(id).value='');
      });
    }

    function removeExpense(id) {
      if(!confirm("確定刪除此筆記帳？")) return;
      document.getElementById('loading').style.display='flex';
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowNum: id })})
      .then(r => r.json()).then(d => renderData(d));
    }
  </script>
</body>
</html>
